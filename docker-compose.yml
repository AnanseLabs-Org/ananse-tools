name: ananselabs-tools

services:
  mcp-server:
    container_name: hst-ananselabs-tools-mcp
    build: .
    ports:
      - "8000:8000"
    environment:
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8000
      - MONGO_URI=mongodb://mongodb:27017/ananse_db
      - BULKCLIX_API_KEY=${BULKCLIX_API_KEY:-}
      - CLOUDFLARE_TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN:-}
      - MCP_ENABLE_OAUTH=${MCP_ENABLE_OAUTH:-false}
      - MCP_PUBLIC_URL=${MCP_PUBLIC_URL:-https://tools.ananselabs.org}
      - MCP_ENABLE_AUTH0=${MCP_ENABLE_AUTH0:-false}
      - AUTH0_DOMAIN=${AUTH0_DOMAIN:-}
      - AUTH0_AUDIENCE=${AUTH0_AUDIENCE:-}
      - AUTH0_CLIENT_ID=${AUTH0_CLIENT_ID:-}
      - AUTH0_CLIENT_SECRET=${AUTH0_CLIENT_SECRET:-}
      - OPENAI_APPS_CHALLENGE_TOKEN=${OPENAI_APPS_CHALLENGE_TOKEN:-}
      - MCP_STATIC_TOKEN=${MCP_STATIC_TOKEN:-}
      - MCP_STATIC_TOKEN_SECRET=${MCP_STATIC_TOKEN_SECRET:-}
      - OLLAMA_API_BASE=${OLLAMA_API_BASE:-http://ollama:11434}
      # Kali computer server — resolved via Docker service name on tools-network
      - KALI_SERVER_URL=${KALI_SERVER_URL:-http://kali-server:8001/mcp}
      - KALI_TIMEOUT=${KALI_TIMEOUT:-300}
    depends_on:
      - mongodb
      - kali-server
    networks:
      - default
    restart: unless-stopped

  # ===== Kali Computer Server =====
  # Runs the kali-server-mcp FastMCP API inside a Kali Linux container.
  # The mcp-server calls this over the internal tools-network; the port is
  # NOT published to the host for security.
  kali-server:
    container_name: hst-ananselabs-tools-kali
    build:
      context: ./tools/servers/kali_server
      dockerfile: Dockerfile
    expose:
      - "8001"
    networks:
      - default
    restart: unless-stopped
    # Optional: pass SHODAN_API_KEY through so kali-server can do its own lookups
    # if needed in future expansions.
    environment:
      - SHODAN_API_KEY=${SHODAN_API_KEY:-}

  mongodb:
    container_name: hst-ananselabs-tools-mongodb
    image: mongo:7.0
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - default
    restart: unless-stopped

  n8n:
    container_name: hst-ananselabs-tools-n8n
    image: docker.n8n.io/n8nio/n8n:latest
    restart: unless-stopped
    environment:
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=https://auto.ananselabs.org/
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=true
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - N8N_PROXY_HOPS=1
      # OIDC Hooks configuration
      - OIDC_ISSUER_URL=https://${AUTH0_DOMAIN:-}/
      - OIDC_CLIENT_ID=${AUTH0_CLIENT_ID:-}
      - OIDC_CLIENT_SECRET=${AUTH0_CLIENT_SECRET:-}
      - OIDC_REDIRECT_URI=https://auto.ananselabs.org/auth/oidc/callback
      - EXTERNAL_HOOK_FILES=/home/node/hooks.js
      - N8N_ADDITIONAL_NON_UI_ROUTES=auth
      - EXTERNAL_FRONTEND_HOOKS_URLS=/assets/oidc-frontend-hook.js
    volumes:
      - n8n_data:/home/node/.n8n
      - ./hooks.js:/home/node/hooks.js:ro
    networks:
      - default
    depends_on:
      - mongodb

  cloudflared-n8n:
    container_name: hst-ananselabs-tools-cloudflared
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${N8N_CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - default
    depends_on:
      - n8n

  # ===== CORE: Docker Socket Proxy (sole container with /var/run/docker.sock access) =====
  docker-proxy:
    container_name: hst-ananselabs-tools-docker-proxy
    image: tecnativa/docker-socket-proxy
    restart: unless-stopped
    networks:
      - internal-docker
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      CONTAINERS: 1
      IMAGES: 1
      VOLUMES: 1
      INFO: 1
      PING: 1
      POST: 1
      DELETE: 1
    labels:
      - 'com.openwa.service=docker-proxy'
      - 'com.openwa.core=true'

  # ===== CORE: OpenWA Backend API =====
  openwa-api:
    container_name: hst-ananselabs-tools-openwa
    image: ghcr.io/rmyndharis/openwa:0.8.10
    restart: unless-stopped
    networks:
      - openwa-network
      - internal-docker
      - default
    security_opt:
      - 'no-new-privileges:true'
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    read_only: true
    tmpfs:
      - /tmp
    pids_limit: 512
    mem_limit: ${OPENWA_MEM_LIMIT:-2g}
    ports:
      - '127.0.0.1:${API_PORT:-2785}:2785'
    expose:
      - '2785'
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - HOME=/tmp
      - XDG_CONFIG_HOME=/tmp/.config
      - XDG_CACHE_HOME=/tmp/.cache
      - PORT=2785
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - DATABASE_TYPE=${DATABASE_TYPE:-}
      - DATABASE_NAME=${DATABASE_NAME:-}
      - DATABASE_HOST=${DATABASE_HOST:-}
      - DATABASE_PORT=${DATABASE_PORT:-}
      - DATABASE_USERNAME=${DATABASE_USERNAME:-}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD:-}
      - DATABASE_SYNCHRONIZE=${DATABASE_SYNCHRONIZE:-false}
      - ENGINE_TYPE=${ENGINE_TYPE:-}
      - SESSION_DATA_PATH=${SESSION_DATA_PATH:-/app/data/sessions}
      - PUPPETEER_HEADLESS=${PUPPETEER_HEADLESS:-true}
      - PUPPETEER_ARGS=${PUPPETEER_ARGS:---no-sandbox,--disable-setuid-sandbox,--disable-dev-shm-usage,--disable-gpu}
      - WWEBJS_WEB_VERSION=${WWEBJS_WEB_VERSION:-}
      - WWEBJS_WEB_VERSION_REMOTE_PATH=${WWEBJS_WEB_VERSION_REMOTE_PATH:-}
      - WWEBJS_AUTH_TIMEOUT_MS=${WWEBJS_AUTH_TIMEOUT_MS:-}
      - STORAGE_TYPE=${STORAGE_TYPE:-}
      - STORAGE_LOCAL_PATH=${STORAGE_LOCAL_PATH:-}
      - S3_ENDPOINT=${S3_ENDPOINT:-}
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID:-}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY:-}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-}
      - S3_REGION=${S3_REGION:-}
      - S3_BUCKET=${S3_BUCKET:-}
      - REDIS_ENABLED=true
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - WEBHOOK_TIMEOUT=${WEBHOOK_TIMEOUT:-10000}
      - WEBHOOK_MAX_RETRIES=${WEBHOOK_MAX_RETRIES:-3}
      - WEBHOOK_RETRY_DELAY=${WEBHOOK_RETRY_DELAY:-5000}
      - RATE_LIMIT_TTL=${RATE_LIMIT_TTL:-60}
      - RATE_LIMIT_MAX=${RATE_LIMIT_MAX:-100}
      - PLUGINS_ENABLED=${PLUGINS_ENABLED:-true}
      - PLUGINS_DIR=${PLUGINS_DIR:-/app/data/plugins}
      - API_MASTER_KEY=${API_MASTER_KEY:-}
      - DOCKER_HOST=tcp://docker-proxy:2375
    volumes:
      - openwa-data:/app/data
      - ./docker-compose.yml:/app/docker-compose.yml:ro
    depends_on:
      docker-proxy:
        condition: service_started
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('http').get('http://localhost:2785/api/health/ready', (r) => process.exit(r.statusCode === 200 ? 0 : 1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - 'com.openwa.service=api'
      - 'com.openwa.core=true'

  # ===== OPTIONAL: Built-in Redis =====
  redis:
    container_name: hst-ananselabs-tools-redis
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - openwa-network
      - default
    security_opt:
      - 'no-new-privileges:true'
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
    labels:
      - 'com.openwa.service=cache'
      - 'com.openwa.builtin=true'

  # ===== LOCAL SEMANTIC SEARCH: Ollama =====
  ollama:
    container_name: hst-ananselabs-tools-ollama
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - default
    ports:
      - "11434:11434"

volumes:
  mongo_data:
    name: bulkclix-mcp_mongo_data
    external: true
  n8n_data:
    name: bulkclix-mcp_n8n_data
    external: true
  openwa-data:
    name: openwa_openwa-data
    external: true
  redis-data:
    name: openwa_redis-data
    external: true
  ollama-data:
    name: openwa_ollama-data
    external: true

networks:
  default:
    name: tools-network
  openwa-network:
    name: openwa-network
  internal-docker:
    name: openwa-internal-docker
    internal: true
